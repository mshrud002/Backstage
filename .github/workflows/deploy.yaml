name: Validate and Deploy Backstage

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Helm dependency update
        run: helm dependency update ./helm/backstage

      - name: Helm lint
        run: helm lint ./helm/backstage --set backstage.appConfig.baseUrl=https://example.com

      - name: Helm template
        run: helm template backstage ./helm/backstage --set backstage.appConfig.baseUrl=https://example.com --set postgresql.enabled=false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform init
        run: terraform init
        working-directory: terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Check if KUBECONFIG secret is set
        id: check_secrets
        run: |
          if [ -z "$KUBECONFIG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "KUBECONFIG secret not set — skipping deploy"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: Configure kubeconfig
        if: steps.check_secrets.outputs.skip != 'true'
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy with Helm
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          helm upgrade --install backstage ./helm/backstage \
            --namespace backstage --create-namespace \
            --set image.repository=${{ secrets.IMAGE_REPOSITORY }} \
            --set image.tag=${{ github.sha }} \
            --set backstage.appConfig.baseUrl=${{ secrets.APP_BASE_URL }} \
            --set backstage.auth.github.clientId=${{ secrets.AUTH_GITHUB_CLIENT_ID }} \
            --set backstage.auth.github.clientSecret=${{ secrets.AUTH_GITHUB_CLIENT_SECRET }} \
            --set postgresql.auth.password=${{ secrets.POSTGRES_PASSWORD }} \
            --wait --timeout 10m
